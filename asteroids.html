<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asteroids</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #000;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .header { display: flex; justify-content: space-between; align-items: center; width: 700px; margin-bottom: 15px; }
        h1 { color: #fff; font-size: 2rem; text-shadow: 0 0 20px rgba(255,255,255,0.5); letter-spacing: 4px; }
        .back-btn { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; }
        .back-btn:hover { color: #fff; border-color: #fff; }
        .stats { display: flex; gap: 25px; color: #fff; font-size: 1.2rem; }
        #game { border: 1px solid rgba(255,255,255,0.3); }
        .controls { margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.85rem; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: all; }
        .overlay h2 { color: #fff; font-size: 2.5rem; margin-bottom: 10px; }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .btn { background: #fff; border: none; color: #000; padding: 15px 40px; border-radius: 5px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { box-shadow: 0 0 30px rgba(255,255,255,0.5); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← Arcade</a>
        <h1>☄️ ASTEROIDS</h1>
        <div class="stats">
            <span>SCORE: <span id="score">0</span></span>
            <span>LIVES: <span id="lives">3</span></span>
        </div>
    </div>
    <div style="position:relative;">
        <canvas id="game" width="700" height="500"></canvas>
        <div class="overlay show" id="startOverlay">
            <h2>☄️ ASTEROIDS</h2>
            <p>Destroy the asteroids!</p>
            <button class="btn" onclick="startGame()">START</button>
        </div>
        <div class="overlay" id="gameOverOverlay">
            <h2>GAME OVER</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">PLAY AGAIN</button>
        </div>
    </div>
    <div class="controls"><kbd>↑</kbd> Thrust &nbsp; <kbd>←</kbd><kbd>→</kbd> Rotate &nbsp; <kbd>Space</kbd> Fire</div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        function beep(freq, dur) {
            if (!audioCtx) audioCtx = new AudioContext();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle'; o.frequency.value = freq;
            g.gain.setValueAtTime(0.1, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }
        
        let ship, bullets, asteroids, particles, score, lives, gameLoop, gameOver;
        
        function createAsteroids(count) {
            const ast = [];
            for (let i = 0; i < count; i++) {
                let x, y;
                do {
                    x = Math.random() * W;
                    y = Math.random() * H;
                } while (Math.hypot(x - W/2, y - H/2) < 150);
                ast.push({
                    x, y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    r: 40 + Math.random() * 20,
                    angle: Math.random() * Math.PI * 2,
                    spin: (Math.random() - 0.5) * 0.02
                });
            }
            return ast;
        }
        
        function startGame() {
            ship = { x: W/2, y: H/2, vx: 0, vy: 0, angle: -Math.PI/2, r: 15 };
            bullets = [];
            asteroids = createAsteroids(5);
            particles = [];
            score = 0; lives = 3; gameOver = false;
            document.getElementById('score').textContent = 0;
            document.getElementById('lives').textContent = 3;
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
            if (gameLoop) cancelAnimationFrame(gameLoop);
            loop();
        }
        
        function loop() {
            update();
            draw();
            if (!gameOver) gameLoop = requestAnimationFrame(loop);
        }
        
        function update() {
            // Ship controls
            if (keys['ArrowLeft']) ship.angle -= 0.08;
            if (keys['ArrowRight']) ship.angle += 0.08;
            if (keys['ArrowUp']) {
                ship.vx += Math.cos(ship.angle) * 0.15;
                ship.vy += Math.sin(ship.angle) * 0.15;
            }
            
            // Ship movement
            ship.x += ship.vx;
            ship.y += ship.vy;
            ship.vx *= 0.99;
            ship.vy *= 0.99;
            
            // Wrap around
            if (ship.x < 0) ship.x = W;
            if (ship.x > W) ship.x = 0;
            if (ship.y < 0) ship.y = H;
            if (ship.y > H) ship.y = 0;
            
            // Bullets
            bullets = bullets.filter(b => {
                b.x += b.vx;
                b.y += b.vy;
                b.life--;
                return b.life > 0 && b.x >= 0 && b.x <= W && b.y >= 0 && b.y <= H;
            });
            
            // Asteroids
            asteroids.forEach(a => {
                a.x += a.vx;
                a.y += a.vy;
                a.angle += a.spin;
                if (a.x < -a.r) a.x = W + a.r;
                if (a.x > W + a.r) a.x = -a.r;
                if (a.y < -a.r) a.y = H + a.r;
                if (a.y > H + a.r) a.y = -a.r;
            });
            
            // Bullet-asteroid collision
            bullets.forEach(b => {
                asteroids.forEach((a, i) => {
                    if (Math.hypot(b.x - a.x, b.y - a.y) < a.r) {
                        b.life = 0;
                        score += Math.round(100 / a.r * 10);
                        document.getElementById('score').textContent = score;
                        beep(150, 0.2);
                        
                        // Particles
                        for (let j = 0; j < 8; j++) {
                            particles.push({
                                x: a.x, y: a.y,
                                vx: (Math.random() - 0.5) * 5,
                                vy: (Math.random() - 0.5) * 5,
                                life: 30
                            });
                        }
                        
                        // Split asteroid
                        if (a.r > 20) {
                            for (let k = 0; k < 2; k++) {
                                asteroids.push({
                                    x: a.x, y: a.y,
                                    vx: (Math.random() - 0.5) * 3,
                                    vy: (Math.random() - 0.5) * 3,
                                    r: a.r / 2,
                                    angle: Math.random() * Math.PI * 2,
                                    spin: (Math.random() - 0.5) * 0.04
                                });
                            }
                        }
                        asteroids.splice(i, 1);
                    }
                });
            });
            
            // Ship-asteroid collision
            asteroids.forEach(a => {
                if (Math.hypot(ship.x - a.x, ship.y - a.y) < a.r + ship.r) {
                    lives--;
                    document.getElementById('lives').textContent = lives;
                    ship.x = W/2; ship.y = H/2; ship.vx = 0; ship.vy = 0;
                    beep(80, 0.5);
                    if (lives <= 0) endGame();
                }
            });
            
            // Particles
            particles = particles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.life--;
                return p.life > 0;
            });
            
            // New wave
            if (asteroids.length === 0) {
                asteroids = createAsteroids(5 + Math.floor(score / 500));
            }
        }
        
        function draw() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, W, H);
            
            // Stars
            ctx.fillStyle = '#fff';
            for (let i = 0; i < 80; i++) ctx.fillRect((i * 137) % W, (i * 97) % H, 1, 1);
            
            // Ship
            ctx.save();
            ctx.translate(ship.x, ship.y);
            ctx.rotate(ship.angle);
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            ctx.beginPath();
            ctx.moveTo(20, 0);
            ctx.lineTo(-15, -12);
            ctx.lineTo(-10, 0);
            ctx.lineTo(-15, 12);
            ctx.closePath();
            ctx.stroke();
            
            // Thrust
            if (keys['ArrowUp']) {
                ctx.strokeStyle = '#f80';
                ctx.beginPath();
                ctx.moveTo(-10, -5);
                ctx.lineTo(-20 - Math.random() * 10, 0);
                ctx.lineTo(-10, 5);
                ctx.stroke();
            }
            ctx.restore();
            
            // Asteroids
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 2;
            asteroids.forEach(a => {
                ctx.save();
                ctx.translate(a.x, a.y);
                ctx.rotate(a.angle);
                ctx.beginPath();
                for (let i = 0; i < 8; i++) {
                    const angle = (i / 8) * Math.PI * 2;
                    const r = a.r * (0.8 + Math.sin(i * 3) * 0.2);
                    if (i === 0) ctx.moveTo(Math.cos(angle) * r, Math.sin(angle) * r);
                    else ctx.lineTo(Math.cos(angle) * r, Math.sin(angle) * r);
                }
                ctx.closePath();
                ctx.stroke();
                ctx.restore();
            });
            
            // Bullets
            ctx.fillStyle = '#fff';
            bullets.forEach(b => {
                ctx.beginPath();
                ctx.arc(b.x, b.y, 3, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life / 30;
                ctx.fillStyle = '#fff';
                ctx.fillRect(p.x, p.y, 2, 2);
            });
            ctx.globalAlpha = 1;
        }
        
        function endGame() {
            gameOver = true;
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }
        
        const keys = {};
        document.addEventListener('keydown', e => {
            keys[e.key] = true;
            if (e.key === ' ' && !gameOver && bullets.length < 5) {
                bullets.push({
                    x: ship.x + Math.cos(ship.angle) * 20,
                    y: ship.y + Math.sin(ship.angle) * 20,
                    vx: Math.cos(ship.angle) * 10,
                    vy: Math.sin(ship.angle) * 10,
                    life: 60
                });
                beep(600, 0.05);
                e.preventDefault();
            }
        });
        document.addEventListener('keyup', e => keys[e.key] = false);
        
        draw();
    </script>
</body>
</html>
