<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f0c29">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Snake - TSN Arcade</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        html {
            touch-action: manipulation;
        }
        body {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            padding: 10px;
        }
        .game-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 600px;
            height: 100%;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 10px;
            padding: 0 5px;
            flex-shrink: 0;
        }
        h1 {
            color: #00ff88;
            font-size: clamp(1.5rem, 5vw, 2.5rem);
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5), 0 0 40px rgba(0, 255, 136, 0.3);
            letter-spacing: 2px;
        }
        .stats {
            display: flex;
            gap: 15px;
            color: white;
            font-size: 0.9rem;
        }
        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .stat-label {
            font-size: 0.6rem;
            opacity: 0.6;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .stat-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 10px rgba(0, 255, 136, 0.5);
        }
        .game-container {
            position: relative;
            width: 100%;
            max-width: min(600px, 95vw);
            aspect-ratio: 1;
            flex-shrink: 0;
        }
        canvas {
            width: 100%;
            height: 100%;
            border-radius: 12px;
            box-shadow: 
                0 0 40px rgba(0, 255, 136, 0.2),
                inset 0 0 40px rgba(0, 0, 0, 0.5);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
            padding: 20px;
        }
        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .overlay h2 {
            color: #00ff88;
            font-size: clamp(1.8rem, 6vw, 3rem);
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.8);
        }
        .overlay .final-score {
            color: white;
            font-size: clamp(1rem, 4vw, 1.5rem);
            margin-bottom: 20px;
            opacity: 0.8;
        }
        .btn {
            background: linear-gradient(180deg, #00ff88 0%, #00cc6a 100%);
            border: none;
            color: #0f0c29;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: clamp(1rem, 3vw, 1.2rem);
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.4);
            touch-action: manipulation;
        }
        .btn:hover, .btn:active {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 50px rgba(0, 255, 136, 0.6);
        }
        
        /* Touch Controls */
        .touch-controls {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            margin-top: 15px;
            width: 100%;
            max-width: 280px;
            flex-shrink: 0;
        }
        .touch-btn {
            background: linear-gradient(145deg, rgba(255,255,255,0.15) 0%, rgba(255,255,255,0.05) 100%);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 16px;
            color: white;
            font-size: 1.8rem;
            padding: 15px;
            cursor: pointer;
            transition: all 0.15s;
            touch-action: manipulation;
            user-select: none;
            -webkit-user-select: none;
        }
        .touch-btn:active {
            background: linear-gradient(145deg, rgba(0,255,136,0.3) 0%, rgba(0,255,136,0.1) 100%);
            border-color: #00ff88;
            transform: scale(0.95);
        }
        .touch-btn.up { grid-column: 2; grid-row: 1; }
        .touch-btn.left { grid-column: 1; grid-row: 2; }
        .touch-btn.down { grid-column: 2; grid-row: 2; }
        .touch-btn.right { grid-column: 3; grid-row: 2; }
        
        /* Swipe area hint */
        .swipe-hint {
            display: none;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            margin-top: 8px;
            text-align: center;
        }
        @media (max-width: 480px) {
            .touch-controls {
                display: grid;
            }
            .swipe-hint {
                display: block;
            }
        }
        @media (min-width: 769px) {
            .touch-controls {
                display: none;
            }
        }
        
        .back-btn {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 12px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            transition: all 0.3s;
            white-space: nowrap;
        }
        .back-btn:hover, .back-btn:active {
            color: #00ff88;
            border-color: #00ff88;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }
        .controls-text {
            margin-top: 10px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.75rem;
            text-align: center;
        }
        .controls-text kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 3px 6px;
            border-radius: 4px;
            margin: 0 2px;
        }
        @media (max-width: 480px) {
            .controls-text {
                display: none;
            }
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas class="particles" id="particles"></canvas>
    
    <div class="game-wrapper">
        <div class="header">
            <a href="index.html" class="back-btn">← Arcade</a>
            <h1>SNAKE</h1>
            <div class="stats">
                <div class="stat">
                    <span class="stat-label">Score</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">Best</span>
                    <span class="stat-value" id="best">0</span>
                </div>
            </div>
        </div>
        
        <div class="game-container">
            <canvas id="game"></canvas>
            
            <div class="overlay show" id="startOverlay">
                <h2>🐍 SNAKE</h2>
                <p class="final-score">Eat food, grow longer!<br>Don't hit walls or yourself.</p>
                <button class="btn" onclick="startGame()">Play</button>
            </div>
            
            <div class="overlay" id="gameOverOverlay">
                <h2>GAME OVER</h2>
                <p class="final-score">Score: <span id="finalScore">0</span></p>
                <button class="btn" onclick="startGame()">Play Again</button>
            </div>
        </div>
        
        <!-- Touch Controls -->
        <div class="touch-controls">
            <button class="touch-btn up" ontouchstart="handleTouch('up')" onclick="handleTouch('up')">⬆️</button>
            <button class="touch-btn left" ontouchstart="handleTouch('left')" onclick="handleTouch('left')">⬅️</button>
            <button class="touch-btn down" ontouchstart="handleTouch('down')" onclick="handleTouch('down')">⬇️</button>
            <button class="touch-btn right" ontouchstart="handleTouch('right')" onclick="handleTouch('right')">➡️</button>
        </div>
        <p class="swipe-hint">👆 Or swipe on the game area</p>
        
        <div class="controls-text">
            <kbd>↑</kbd> <kbd>↓</kbd> <kbd>←</kbd> <kbd>→</kbd> or <kbd>W</kbd> <kbd>A</kbd> <kbd>S</kbd> <kbd>D</kbd> to move
        </div>
    </div>

    <script>
        // Game canvas setup
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        // Responsive canvas size
        const container = document.querySelector('.game-container');
        const gridSize = 20;
        let tileCount = 20;
        
        function resizeCanvas() {
            const size = Math.min(container.clientWidth, container.clientHeight, 600);
            canvas.width = size;
            canvas.height = size;
            tileCount = Math.floor(size / gridSize);
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        
        // Game state
        let snake = [];
        let direction = { x: 1, y: 0 };
        let nextDirection = { x: 1, y: 0 };
        let food = { x: 15, y: 15 };
        let score = 0;
        let best = parseInt(localStorage.getItem('snakeBest')) || 0;
        let gameLoop = null;
        let speed = 100;
        let foodParticles = [];
        let glowIntensity = 0;
        
        document.getElementById('best').textContent = best;
        
        // Touch handling
        let touchStartX = 0;
        let touchStartY = 0;
        
        function handleTouch(dir) {
            switch(dir) {
                case 'up':
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'down':
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'left':
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'right':
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        }
        
        // Swipe detection on canvas
        canvas.addEventListener('touchstart', (e) => {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
        }, { passive: true });
        
        canvas.addEventListener('touchend', (e) => {
            if (!touchStartX || !touchStartY) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const touchEndY = e.changedTouches[0].clientY;
            
            const dx = touchEndX - touchStartX;
            const dy = touchEndY - touchStartY;
            
            const minSwipe = 30;
            
            if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > minSwipe) {
                if (dx > 0 && direction.x !== -1) nextDirection = { x: 1, y: 0 };
                else if (dx < 0 && direction.x !== 1) nextDirection = { x: -1, y: 0 };
            } else if (Math.abs(dy) > minSwipe) {
                if (dy > 0 && direction.y !== -1) nextDirection = { x: 0, y: 1 };
                else if (dy < 0 && direction.y !== 1) nextDirection = { x: 0, y: -1 };
            }
            
            touchStartX = 0;
            touchStartY = 0;
        }, { passive: true });
        
        function startGame() {
            snake = [
                { x: Math.floor(tileCount / 2), y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 1, y: Math.floor(tileCount / 2) },
                { x: Math.floor(tileCount / 2) - 2, y: Math.floor(tileCount / 2) }
            ];
            direction = { x: 1, y: 0 };
            nextDirection = { x: 1, y: 0 };
            score = 0;
            speed = 100;
            document.getElementById('score').textContent = score;
            document.getElementById('startOverlay').classList.remove('show');
            document.getElementById('gameOverOverlay').classList.remove('show');
            spawnFood();
            
            if (gameLoop) clearInterval(gameLoop);
            gameLoop = setInterval(update, speed);
        }
        
        function spawnFood() {
            do {
                food = {
                    x: Math.floor(Math.random() * tileCount),
                    y: Math.floor(Math.random() * tileCount)
                };
            } while (snake.some(s => s.x === food.x && s.y === food.y));
        }
        
        function update() {
            direction = { ...nextDirection };
            
            const head = { x: snake[0].x + direction.x, y: snake[0].y + direction.y };
            
            // Wall collision
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            // Self collision
            if (snake.some(s => s.x === head.x && s.y === head.y)) {
                gameOver();
                return;
            }
            
            snake.unshift(head);
            
            // Eat food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').textContent = score;
                
                // Create food particles
                for (let i = 0; i < 8; i++) {
                    foodParticles.push({
                        x: food.x * gridSize + gridSize / 2,
                        y: food.y * gridSize + gridSize / 2,
                        vx: (Math.random() - 0.5) * 6,
                        vy: (Math.random() - 0.5) * 6,
                        life: 1,
                        size: Math.random() * 4 + 2
                    });
                }
                
                spawnFood();
                
                // Speed up
                if (speed > 60) {
                    speed -= 2;
                    clearInterval(gameLoop);
                    gameLoop = setInterval(update, speed);
                }
            } else {
                snake.pop();
            }
            
            draw();
        }
        
        function draw() {
            const actualGridSize = canvas.width / tileCount;
            
            // Background
            ctx.fillStyle = '#1a1a2e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.03)';
            ctx.lineWidth = 1;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * actualGridSize, 0);
                ctx.lineTo(i * actualGridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * actualGridSize);
                ctx.lineTo(canvas.width, i * actualGridSize);
                ctx.stroke();
            }
            
            // Food glow
            glowIntensity = (Math.sin(Date.now() / 200) + 1) / 2;
            const foodX = food.x * actualGridSize + actualGridSize / 2;
            const foodY = food.y * actualGridSize + actualGridSize / 2;
            
            const gradient = ctx.createRadialGradient(foodX, foodY, 0, foodX, foodY, actualGridSize * 2);
            gradient.addColorStop(0, `rgba(255, 50, 50, ${0.3 + glowIntensity * 0.2})`);
            gradient.addColorStop(1, 'rgba(255, 50, 50, 0)');
            ctx.fillStyle = gradient;
            ctx.fillRect(food.x * actualGridSize - actualGridSize, food.y * actualGridSize - actualGridSize, actualGridSize * 3, actualGridSize * 3);
            
            // Food
            ctx.beginPath();
            ctx.arc(foodX, foodY, actualGridSize / 2 - 2, 0, Math.PI * 2);
            const foodGrad = ctx.createRadialGradient(foodX - 3, foodY - 3, 0, foodX, foodY, actualGridSize / 2);
            foodGrad.addColorStop(0, '#ff6b6b');
            foodGrad.addColorStop(1, '#c92a2a');
            ctx.fillStyle = foodGrad;
            ctx.fill();
            
            // Food shine
            ctx.beginPath();
            ctx.arc(foodX - 3, foodY - 3, 3, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.fill();
            
            // Snake
            snake.forEach((segment, index) => {
                const x = segment.x * actualGridSize;
                const y = segment.y * actualGridSize;
                const isHead = index === 0;
                
                // Glow for head
                if (isHead) {
                    const headGlow = ctx.createRadialGradient(
                        x + actualGridSize / 2, y + actualGridSize / 2, 0,
                        x + actualGridSize / 2, y + actualGridSize / 2, actualGridSize * 1.5
                    );
                    headGlow.addColorStop(0, 'rgba(0, 255, 136, 0.4)');
                    headGlow.addColorStop(1, 'rgba(0, 255, 136, 0)');
                    ctx.fillStyle = headGlow;
                    ctx.fillRect(x - actualGridSize / 2, y - actualGridSize / 2, actualGridSize * 2, actualGridSize * 2);
                }
                
                // Body
                const hue = 140 + (index / Math.max(snake.length, 1)) * 20;
                const lightness = 50 - (index / Math.max(snake.length, 1)) * 15;
                
                const padding = actualGridSize * 0.05;
                const size = actualGridSize - padding * 2;
                
                ctx.fillStyle = `hsl(${hue}, 100%, ${lightness}%)`;
                ctx.beginPath();
                ctx.roundRect(x + padding, y + padding, size, size, isHead ? size * 0.3 : size * 0.2);
                ctx.fill();
                
                // Shine
                ctx.fillStyle = 'rgba(255, 255, 255, 0.2)';
                ctx.beginPath();
                ctx.roundRect(x + padding * 2, y + padding * 2, size * 0.4, size * 0.25, size * 0.1);
                ctx.fill();
                
                // Eyes on head
                if (isHead) {
                    const eyeOffset = actualGridSize * 0.15;
                    const eyeSize = actualGridSize * 0.12;
                    
                    let eye1x = x + actualGridSize / 2, eye1y = y + actualGridSize / 2;
                    let eye2x = x + actualGridSize / 2, eye2y = y + actualGridSize / 2;
                    
                    if (direction.x === 1) { eye1x += eyeOffset; eye2x += eyeOffset; eye1y -= eyeOffset; eye2y += eyeOffset; }
                    else if (direction.x === -1) { eye1x -= eyeOffset; eye2x -= eyeOffset; eye1y -= eyeOffset; eye2y += eyeOffset; }
                    else if (direction.y === 1) { eye1y += eyeOffset; eye2y += eyeOffset; eye1x -= eyeOffset; eye2x += eyeOffset; }
                    else { eye1y -= eyeOffset; eye2y -= eyeOffset; eye1x -= eyeOffset; eye2x += eyeOffset; }
                    
                    ctx.fillStyle = 'white';
                    ctx.beginPath();
                    ctx.arc(eye1x, eye1y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2x, eye2y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                    
                    ctx.fillStyle = '#1a1a2e';
                    ctx.beginPath();
                    ctx.arc(eye1x + direction.x * 1, eye1y + direction.y * 1, eyeSize * 0.5, 0, Math.PI * 2);
                    ctx.arc(eye2x + direction.x * 1, eye2y + direction.y * 1, eyeSize * 0.5, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
            
            // Food particles
            foodParticles = foodParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.2;
                p.life -= 0.03;
                
                if (p.life > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255, 107, 107, ${p.life})`;
                    ctx.fill();
                    return true;
                }
                return false;
            });
        }
        
        function gameOver() {
            clearInterval(gameLoop);
            gameLoop = null;
            
            if (score > best) {
                best = score;
                localStorage.setItem('snakeBest', best);
                document.getElementById('best').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }
        
        // Keyboard controls
        document.addEventListener('keydown', e => {
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    e.preventDefault();
                    if (direction.y !== 1) nextDirection = { x: 0, y: -1 };
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    e.preventDefault();
                    if (direction.y !== -1) nextDirection = { x: 0, y: 1 };
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    e.preventDefault();
                    if (direction.x !== 1) nextDirection = { x: -1, y: 0 };
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    e.preventDefault();
                    if (direction.x !== -1) nextDirection = { x: 1, y: 0 };
                    break;
            }
        });
        
        // Initial draw
        draw();
        
        // Particle background
        const particleCanvas = document.getElementById('particles');
        const pctx = particleCanvas.getContext('2d');
        
        function resizeParticles() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }
        resizeParticles();
        window.addEventListener('resize', resizeParticles);
        
        const particles = [];
        for (let i = 0; i < 30; i++) {
            particles.push({
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                vx: (Math.random() - 0.5) * 0.5,
                vy: (Math.random() - 0.5) * 0.5,
                size: Math.random() * 3 + 1,
                alpha: Math.random() * 0.5 + 0.1
            });
        }
        
        function drawParticles() {
            pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.x += p.vx;
                p.y += p.vy;
                if (p.x < 0) p.x = particleCanvas.width;
                if (p.x > particleCanvas.width) p.x = 0;
                if (p.y < 0) p.y = particleCanvas.height;
                if (p.y > particleCanvas.height) p.y = 0;
                
                pctx.beginPath();
                pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pctx.fillStyle = `rgba(0, 255, 136, ${p.alpha})`;
                pctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
    </script>
</body>
</html>
