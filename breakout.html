<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breakout</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #0a1628 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', sans-serif;
        }
        .header { display: flex; justify-content: space-between; align-items: center; width: 600px; margin-bottom: 15px; }
        h1 { color: #ff6b6b; font-size: 2rem; text-shadow: 0 0 20px rgba(255,107,107,0.5); letter-spacing: 4px; }
        .back-btn { color: rgba(255,255,255,0.6); text-decoration: none; padding: 8px 16px; border: 1px solid rgba(255,255,255,0.2); border-radius: 20px; }
        .back-btn:hover { color: #ff6b6b; border-color: #ff6b6b; }
        .stats { display: flex; gap: 30px; color: #fff; font-size: 1.2rem; }
        .stat-val { color: #ff6b6b; font-weight: bold; }
        #game { border-radius: 8px; box-shadow: 0 0 40px rgba(255,107,107,0.2); border: 2px solid rgba(255,107,107,0.3); }
        .controls { margin-top: 15px; color: rgba(255,255,255,0.4); font-size: 0.85rem; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 8px; opacity: 0; pointer-events: none; transition: opacity 0.3s; }
        .overlay.show { opacity: 1; pointer-events: all; }
        .overlay h2 { color: #ff6b6b; font-size: 2.5rem; margin-bottom: 10px; text-shadow: 0 0 30px rgba(255,107,107,0.8); }
        .overlay p { color: rgba(255,255,255,0.7); margin-bottom: 20px; }
        .btn { background: linear-gradient(180deg, #ff6b6b 0%, #c92a2a 100%); border: none; color: #fff; padding: 15px 40px; border-radius: 30px; font-size: 1.1rem; font-weight: bold; cursor: pointer; }
        .btn:hover { transform: translateY(-2px); box-shadow: 0 0 30px rgba(255,107,107,0.5); }
    </style>
</head>
<body>
    <div class="header">
        <a href="index.html" class="back-btn">← Arcade</a>
        <h1>BREAKOUT</h1>
        <div class="stats">
            <span>Score: <span class="stat-val" id="score">0</span></span>
            <span>Lives: <span class="stat-val" id="lives">3</span></span>
        </div>
    </div>
    <div style="position:relative;">
        <canvas id="game" width="600" height="500"></canvas>
        <div class="overlay show" id="startOverlay">
            <h2>🧱 BREAKOUT</h2>
            <p>Break all the bricks!</p>
            <button class="btn" onclick="startGame()">Play</button>
        </div>
        <div class="overlay" id="gameOverOverlay">
            <h2>GAME OVER</h2>
            <p>Score: <span id="finalScore">0</span></p>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
        <div class="overlay" id="winOverlay">
            <h2>🎉 YOU WIN!</h2>
            <p>Score: <span id="winScore">0</span></p>
            <button class="btn" onclick="startGame()">Play Again</button>
        </div>
    </div>
    <div class="controls">Move: <kbd>←</kbd> <kbd>→</kbd> or Mouse &nbsp; Launch: <kbd>Space</kbd></div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const W = canvas.width, H = canvas.height;
        
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let beatInterval, bpm = 120;
        
        function beep(freq, dur) {
            if (!audioCtx) audioCtx = new AudioContext();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square'; o.frequency.value = freq;
            g.gain.setValueAtTime(0.15, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + dur);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + dur);
        }
        
        function playBeat() {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine'; o.frequency.setValueAtTime(80, t); o.frequency.exponentialRampToValueAtTime(40, t + 0.1);
            g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.01, t + 0.15);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(t); o.stop(t + 0.15);
        }
        
        function startBeat() { if (beatInterval) clearInterval(beatInterval); beatInterval = setInterval(playBeat, 60000/bpm); }
        function stopBeat() { if (beatInterval) clearInterval(beatInterval); }
        
        const ROWS = 5, COLS = 10, BRICK_W = 54, BRICK_H = 20, BRICK_PAD = 4;
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#1dd1a1', '#ff9ff3'];
        
        let paddle, ball, bricks, score, lives, launched, particles, gameLoop;
        
        function createBricks() {
            const b = [];
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    b.push({ x: c * (BRICK_W + BRICK_PAD) + 30, y: r * (BRICK_H + BRICK_PAD) + 50, w: BRICK_W, h: BRICK_H, color: colors[r], alive: true });
                }
            }
            return b;
        }
        
        function resetBall() {
            ball = { x: paddle.x + paddle.w/2, y: paddle.y - 10, vx: 0, vy: 0, r: 8 };
            launched = false;
        }
        
        function startGame() {
            paddle = { x: W/2 - 50, y: H - 30, w: 100, h: 12 };
            bricks = createBricks();
            score = 0; lives = 3; particles = [];
            document.getElementById('score').textContent = 0;
            document.getElementById('lives').textContent = 3;
            document.querySelectorAll('.overlay').forEach(o => o.classList.remove('show'));
            resetBall();
            bpm = 120;
            if (audioCtx) startBeat();
            if (gameLoop) cancelAnimationFrame(gameLoop);
            loop();
        }
        
        function loop() {
            update();
            draw();
            gameLoop = requestAnimationFrame(loop);
        }
        
        function update() {
            if (!launched) { ball.x = paddle.x + paddle.w/2; ball.y = paddle.y - ball.r; return; }
            
            ball.x += ball.vx; ball.y += ball.vy;
            
            // Walls
            if (ball.x < ball.r || ball.x > W - ball.r) { ball.vx *= -1; beep(300, 0.05); }
            if (ball.y < ball.r) { ball.vy *= -1; beep(300, 0.05); }
            
            // Paddle
            if (ball.y + ball.r > paddle.y && ball.y < paddle.y + paddle.h && ball.x > paddle.x && ball.x < paddle.x + paddle.w) {
                ball.vy = -Math.abs(ball.vy);
                ball.vx += (ball.x - (paddle.x + paddle.w/2)) * 0.1;
                beep(400, 0.1);
            }
            
            // Bricks
            bricks.forEach(b => {
                if (!b.alive) return;
                if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
                    b.alive = false;
                    ball.vy *= -1;
                    score += 10;
                    bpm = Math.min(200, bpm + 2);
                    document.getElementById('score').textContent = score;
                    beep(600 + Math.random() * 200, 0.1);
                    for (let i = 0; i < 8; i++) {
                        particles.push({ x: b.x + b.w/2, y: b.y + b.h/2, vx: (Math.random()-0.5)*8, vy: (Math.random()-0.5)*8, color: b.color, life: 1 });
                    }
                }
            });
            
            // Bottom
            if (ball.y > H) {
                lives--;
                document.getElementById('lives').textContent = lives;
                if (lives <= 0) { endGame(false); } else { resetBall(); }
            }
            
            // Win
            if (bricks.every(b => !b.alive)) endGame(true);
            
            // Particles
            particles = particles.filter(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.2; p.life -= 0.03; return p.life > 0; });
        }
        
        function draw() {
            ctx.fillStyle = '#0a0a15'; ctx.fillRect(0, 0, W, H);
            
            // Bricks
            bricks.forEach(b => {
                if (!b.alive) return;
                ctx.shadowColor = b.color; ctx.shadowBlur = 10;
                ctx.fillStyle = b.color;
                ctx.fillRect(b.x, b.y, b.w, b.h);
                ctx.fillStyle = 'rgba(255,255,255,0.3)';
                ctx.fillRect(b.x, b.y, b.w, 4);
            });
            ctx.shadowBlur = 0;
            
            // Paddle
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 15;
            ctx.fillRect(paddle.x, paddle.y, paddle.w, paddle.h);
            ctx.shadowBlur = 0;
            
            // Ball
            ctx.beginPath();
            ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
            ctx.fillStyle = '#fff';
            ctx.shadowColor = '#fff'; ctx.shadowBlur = 20;
            ctx.fill();
            ctx.shadowBlur = 0;
            
            // Particles
            particles.forEach(p => {
                ctx.globalAlpha = p.life;
                ctx.fillStyle = p.color;
                ctx.fillRect(p.x - 3, p.y - 3, 6, 6);
            });
            ctx.globalAlpha = 1;
        }
        
        function endGame(won) {
            stopBeat();
            cancelAnimationFrame(gameLoop);
            if (won) {
                document.getElementById('winScore').textContent = score;
                document.getElementById('winOverlay').classList.add('show');
            } else {
                document.getElementById('finalScore').textContent = score;
                document.getElementById('gameOverOverlay').classList.add('show');
            }
        }
        
        document.addEventListener('keydown', e => {
            if (e.key === 'ArrowLeft') paddle.x = Math.max(0, paddle.x - 30);
            if (e.key === 'ArrowRight') paddle.x = Math.min(W - paddle.w, paddle.x + 30);
            if (e.key === ' ' && !launched) {
                launched = true;
                ball.vx = (Math.random() - 0.5) * 4;
                ball.vy = -6;
                if (!audioCtx) audioCtx = new AudioContext();
                startBeat();
            }
        });
        
        canvas.addEventListener('mousemove', e => {
            const rect = canvas.getBoundingClientRect();
            paddle.x = Math.max(0, Math.min(W - paddle.w, e.clientX - rect.left - paddle.w/2));
        });
        
        canvas.addEventListener('click', () => {
            if (!launched) {
                launched = true;
                ball.vx = (Math.random() - 0.5) * 4;
                ball.vy = -6;
                if (!audioCtx) audioCtx = new AudioContext();
                startBeat();
            }
        });
        
        resetBall();
        paddle = { x: W/2 - 50, y: H - 30, w: 100, h: 12 };
        bricks = createBricks();
        draw();
    </script>
</body>
</html>
