<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }
        .game-wrapper {
            display: flex;
            gap: 30px;
            align-items: flex-start;
        }
        .side-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 140px;
        }
        .panel-box {
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 15px;
            text-align: center;
        }
        .panel-title {
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .panel-value {
            color: #00f5ff;
            font-size: 1.8rem;
            font-weight: bold;
            text-shadow: 0 0 20px rgba(0, 245, 255, 0.5);
        }
        .next-canvas {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }
        .main-area {
            position: relative;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        h1 {
            color: #ff00ff;
            font-size: 2.5rem;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.6), 0 0 60px rgba(255, 0, 255, 0.4);
            letter-spacing: 8px;
        }
        .back-btn {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 0.9rem;
            padding: 8px 16px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 20px;
            transition: all 0.3s;
        }
        .back-btn:hover {
            color: #ff00ff;
            border-color: #ff00ff;
            box-shadow: 0 0 20px rgba(255, 0, 255, 0.3);
        }
        #game {
            border-radius: 8px;
            box-shadow: 
                0 0 60px rgba(255, 0, 255, 0.2),
                inset 0 0 60px rgba(0, 0, 0, 0.5);
            border: 3px solid rgba(255, 0, 255, 0.3);
        }
        .controls {
            margin-top: 15px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            text-align: center;
        }
        .controls kbd {
            background: rgba(255, 255, 255, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            margin: 0 2px;
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s;
        }
        .overlay.show {
            opacity: 1;
            pointer-events: all;
        }
        .overlay h2 {
            color: #ff00ff;
            font-size: 2.5rem;
            margin-bottom: 10px;
            text-shadow: 0 0 30px rgba(255, 0, 255, 0.8);
        }
        .overlay p {
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 25px;
            font-size: 1.2rem;
        }
        .btn {
            background: linear-gradient(180deg, #ff00ff 0%, #cc00cc 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: all 0.3s;
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.4);
        }
        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 0 50px rgba(255, 0, 255, 0.6);
        }
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }
    </style>
</head>
<body>
    <canvas class="particles" id="particles"></canvas>
    
    <div class="game-wrapper">
        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">Score</div>
                <div class="panel-value" id="score">0</div>
            </div>
            <div class="panel-box">
                <div class="panel-title">Level</div>
                <div class="panel-value" id="level">1</div>
            </div>
            <div class="panel-box">
                <div class="panel-title">Lines</div>
                <div class="panel-value" id="lines">0</div>
            </div>
        </div>
        
        <div class="main-area">
            <div class="header">
                <a href="index.html" class="back-btn">← Arcade</a>
                <h1>TETRIS</h1>
            </div>
            <div style="position: relative;">
                <canvas id="game" width="300" height="600"></canvas>
                <div class="overlay show" id="startOverlay">
                    <h2>TETRIS</h2>
                    <p>Classic block stacking</p>
                    <button class="btn" onclick="startGame()">Play</button>
                </div>
                <div class="overlay" id="gameOverOverlay">
                    <h2>GAME OVER</h2>
                    <p>Score: <span id="finalScore">0</span></p>
                    <button class="btn" onclick="startGame()">Play Again</button>
                </div>
            </div>
            <div class="controls">
                <kbd>←</kbd><kbd>→</kbd> Move &nbsp;
                <kbd>↑</kbd> Rotate &nbsp;
                <kbd>↓</kbd> Soft Drop &nbsp;
                <kbd>Space</kbd> Hard Drop
            </div>
        </div>
        
        <div class="side-panel">
            <div class="panel-box">
                <div class="panel-title">Next</div>
                <canvas id="next" class="next-canvas" width="100" height="80"></canvas>
            </div>
            <div class="panel-box">
                <div class="panel-title">Best</div>
                <div class="panel-value" id="best">0</div>
            </div>
        </div>
    </div>

    <script>
        // Audio
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx = null;
        let bgmInterval = null;
        let baseTempo = 140;
        let currentTempo = baseTempo;
        let noteIndex = 0;
        
        // Tetris theme approximation (Type A melody)
        const melody = [
            { note: 'E5', dur: 1 }, { note: 'B4', dur: 0.5 }, { note: 'C5', dur: 0.5 },
            { note: 'D5', dur: 1 }, { note: 'C5', dur: 0.5 }, { note: 'B4', dur: 0.5 },
            { note: 'A4', dur: 1 }, { note: 'A4', dur: 0.5 }, { note: 'C5', dur: 0.5 },
            { note: 'E5', dur: 1 }, { note: 'D5', dur: 0.5 }, { note: 'C5', dur: 0.5 },
            { note: 'B4', dur: 1.5 }, { note: 'C5', dur: 0.5 },
            { note: 'D5', dur: 1 }, { note: 'E5', dur: 1 },
            { note: 'C5', dur: 1 }, { note: 'A4', dur: 1 },
            { note: 'A4', dur: 2 }
        ];
        
        const noteFreq = {
            'A4': 440, 'B4': 493.88, 'C5': 523.25, 'D5': 587.33, 'E5': 659.25
        };
        
        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
        }
        
        function playNote(freq, duration) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.value = freq;
            gain.gain.setValueAtTime(0.15, t);
            gain.gain.exponentialRampToValueAtTime(0.01, t + duration * 0.9);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(t);
            osc.stop(t + duration);
        }
        
        function startMusic() {
            if (bgmInterval) clearInterval(bgmInterval);
            noteIndex = 0;
            playNextNote();
        }
        
        function playNextNote() {
            if (!audioCtx || gameOver) return;
            const n = melody[noteIndex % melody.length];
            const beatMs = 60000 / currentTempo;
            const duration = (n.dur * beatMs) / 1000;
            playNote(noteFreq[n.note], duration * 0.9);
            noteIndex++;
            bgmInterval = setTimeout(playNextNote, n.dur * beatMs);
        }
        
        function stopMusic() {
            if (bgmInterval) { clearTimeout(bgmInterval); bgmInterval = null; }
        }
        
        function playSound(type) {
            if (!audioCtx) return;
            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            if (type === 'move') {
                osc.type = 'sine';
                osc.frequency.value = 200;
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.05);
                osc.start(t); osc.stop(t + 0.05);
            } else if (type === 'rotate') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(500, t + 0.1);
                gain.gain.setValueAtTime(0.1, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
                osc.start(t); osc.stop(t + 0.1);
            } else if (type === 'drop') {
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(150, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.2);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'clear') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, t);
                osc.frequency.exponentialRampToValueAtTime(800, t + 0.15);
                gain.gain.setValueAtTime(0.2, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.2);
                osc.start(t); osc.stop(t + 0.2);
            } else if (type === 'gameover') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, t);
                osc.frequency.exponentialRampToValueAtTime(50, t + 0.8);
                gain.gain.setValueAtTime(0.3, t);
                gain.gain.exponentialRampToValueAtTime(0.01, t + 0.8);
                osc.start(t); osc.stop(t + 0.8);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
        }
        
        // Particles
        const particleCanvas = document.getElementById('particles');
        const pctx = particleCanvas.getContext('2d');
        particleCanvas.width = window.innerWidth;
        particleCanvas.height = window.innerHeight;
        
        const particles = [];
        for (let i = 0; i < 40; i++) {
            particles.push({
                x: Math.random() * particleCanvas.width,
                y: Math.random() * particleCanvas.height,
                vx: (Math.random() - 0.5) * 0.3,
                vy: (Math.random() - 0.5) * 0.3,
                size: Math.random() * 2 + 1,
                alpha: Math.random() * 0.4 + 0.1
            });
        }
        
        function drawParticles() {
            pctx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0) p.x = particleCanvas.width;
                if (p.x > particleCanvas.width) p.x = 0;
                if (p.y < 0) p.y = particleCanvas.height;
                if (p.y > particleCanvas.height) p.y = 0;
                pctx.beginPath();
                pctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                pctx.fillStyle = `rgba(255, 0, 255, ${p.alpha})`;
                pctx.fill();
            });
            requestAnimationFrame(drawParticles);
        }
        drawParticles();
        
        // Game
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const nextCanvas = document.getElementById('next');
        const nextCtx = nextCanvas.getContext('2d');
        
        const COLS = 10;
        const ROWS = 20;
        const BLOCK = 30;
        
        const PIECES = {
            I: { shape: [[1,1,1,1]], color: '#00f5ff' },
            O: { shape: [[1,1],[1,1]], color: '#ffff00' },
            T: { shape: [[0,1,0],[1,1,1]], color: '#ff00ff' },
            S: { shape: [[0,1,1],[1,1,0]], color: '#00ff00' },
            Z: { shape: [[1,1,0],[0,1,1]], color: '#ff0000' },
            J: { shape: [[1,0,0],[1,1,1]], color: '#0000ff' },
            L: { shape: [[0,0,1],[1,1,1]], color: '#ff8800' }
        };
        const PIECE_NAMES = Object.keys(PIECES);
        
        let board = [];
        let current = null;
        let currentPos = { x: 0, y: 0 };
        let nextPiece = null;
        let score = 0;
        let level = 1;
        let lines = 0;
        let gameOver = false;
        let dropInterval = null;
        let best = parseInt(localStorage.getItem('tetrisBest')) || 0;
        let clearParticles = [];
        
        document.getElementById('best').textContent = best;
        
        function createBoard() {
            return Array(ROWS).fill(null).map(() => Array(COLS).fill(0));
        }
        
        function randomPiece() {
            const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
            return { ...PIECES[name], name };
        }
        
        function rotate(shape) {
            const rows = shape.length, cols = shape[0].length;
            const rotated = Array(cols).fill(null).map(() => Array(rows).fill(0));
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    rotated[c][rows - 1 - r] = shape[r][c];
                }
            }
            return rotated;
        }
        
        function collides(shape, pos) {
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const x = pos.x + c, y = pos.y + r;
                        if (x < 0 || x >= COLS || y >= ROWS) return true;
                        if (y >= 0 && board[y][x]) return true;
                    }
                }
            }
            return false;
        }
        
        function merge() {
            for (let r = 0; r < current.shape.length; r++) {
                for (let c = 0; c < current.shape[r].length; c++) {
                    if (current.shape[r][c]) {
                        const y = currentPos.y + r;
                        if (y >= 0) board[y][currentPos.x + c] = current.color;
                    }
                }
            }
        }
        
        function clearLines() {
            let cleared = 0;
            for (let r = ROWS - 1; r >= 0; r--) {
                if (board[r].every(cell => cell)) {
                    // Particles for cleared line
                    for (let c = 0; c < COLS; c++) {
                        for (let i = 0; i < 5; i++) {
                            clearParticles.push({
                                x: c * BLOCK + BLOCK / 2,
                                y: r * BLOCK + BLOCK / 2,
                                vx: (Math.random() - 0.5) * 10,
                                vy: (Math.random() - 0.5) * 10,
                                color: board[r][c],
                                life: 1,
                                size: Math.random() * 6 + 3
                            });
                        }
                    }
                    board.splice(r, 1);
                    board.unshift(Array(COLS).fill(0));
                    cleared++;
                    r++;
                }
            }
            if (cleared > 0) {
                playSound('clear');
                const points = [0, 100, 300, 500, 800][cleared] * level;
                score += points;
                lines += cleared;
                level = Math.floor(lines / 10) + 1;
                currentTempo = baseTempo + (level - 1) * 15;
                updateDisplay();
                resetDropInterval();
            }
        }
        
        function ghostY() {
            let y = currentPos.y;
            while (!collides(current.shape, { x: currentPos.x, y: y + 1 })) y++;
            return y;
        }
        
        function spawn() {
            current = nextPiece || randomPiece();
            nextPiece = randomPiece();
            currentPos = { x: Math.floor((COLS - current.shape[0].length) / 2), y: 0 };
            if (collides(current.shape, currentPos)) {
                endGame();
            }
            drawNext();
        }
        
        function drop() {
            if (gameOver) return;
            if (!collides(current.shape, { x: currentPos.x, y: currentPos.y + 1 })) {
                currentPos.y++;
            } else {
                merge();
                clearLines();
                spawn();
            }
            draw();
        }
        
        function hardDrop() {
            while (!collides(current.shape, { x: currentPos.x, y: currentPos.y + 1 })) {
                currentPos.y++;
                score += 2;
            }
            playSound('drop');
            merge();
            clearLines();
            spawn();
            draw();
            updateDisplay();
        }
        
        function move(dir) {
            if (!collides(current.shape, { x: currentPos.x + dir, y: currentPos.y })) {
                currentPos.x += dir;
                playSound('move');
                draw();
            }
        }
        
        function rotatePiece() {
            const rotated = rotate(current.shape);
            if (!collides(rotated, currentPos)) {
                current.shape = rotated;
                playSound('rotate');
                draw();
            } else {
                // Wall kick
                for (const offset of [-1, 1, -2, 2]) {
                    if (!collides(rotated, { x: currentPos.x + offset, y: currentPos.y })) {
                        current.shape = rotated;
                        currentPos.x += offset;
                        playSound('rotate');
                        draw();
                        return;
                    }
                }
            }
        }
        
        function draw() {
            // Background
            ctx.fillStyle = '#0a0a15';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.05)';
            for (let r = 0; r <= ROWS; r++) {
                ctx.beginPath();
                ctx.moveTo(0, r * BLOCK);
                ctx.lineTo(canvas.width, r * BLOCK);
                ctx.stroke();
            }
            for (let c = 0; c <= COLS; c++) {
                ctx.beginPath();
                ctx.moveTo(c * BLOCK, 0);
                ctx.lineTo(c * BLOCK, canvas.height);
                ctx.stroke();
            }
            
            // Board
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    if (board[r][c]) drawBlock(c, r, board[r][c]);
                }
            }
            
            // Ghost
            if (current) {
                const gy = ghostY();
                for (let r = 0; r < current.shape.length; r++) {
                    for (let c = 0; c < current.shape[r].length; c++) {
                        if (current.shape[r][c]) {
                            const x = (currentPos.x + c) * BLOCK;
                            const y = (gy + r) * BLOCK;
                            ctx.strokeStyle = current.color;
                            ctx.globalAlpha = 0.3;
                            ctx.strokeRect(x + 2, y + 2, BLOCK - 4, BLOCK - 4);
                            ctx.globalAlpha = 1;
                        }
                    }
                }
                
                // Current piece
                for (let r = 0; r < current.shape.length; r++) {
                    for (let c = 0; c < current.shape[r].length; c++) {
                        if (current.shape[r][c]) {
                            drawBlock(currentPos.x + c, currentPos.y + r, current.color);
                        }
                    }
                }
            }
            
            // Clear particles
            clearParticles = clearParticles.filter(p => {
                p.x += p.vx;
                p.y += p.vy;
                p.vy += 0.3;
                p.life -= 0.02;
                if (p.life > 0) {
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
                    ctx.fillStyle = p.color;
                    ctx.globalAlpha = p.life;
                    ctx.fill();
                    ctx.globalAlpha = 1;
                    return true;
                }
                return false;
            });
            
            if (clearParticles.length > 0) requestAnimationFrame(draw);
        }
        
        function drawBlock(x, y, color) {
            const px = x * BLOCK, py = y * BLOCK;
            
            // Glow
            ctx.shadowColor = color;
            ctx.shadowBlur = 10;
            
            // Main block
            const grad = ctx.createLinearGradient(px, py, px + BLOCK, py + BLOCK);
            grad.addColorStop(0, color);
            grad.addColorStop(1, shadeColor(color, -30));
            ctx.fillStyle = grad;
            ctx.fillRect(px + 1, py + 1, BLOCK - 2, BLOCK - 2);
            
            // Shine
            ctx.fillStyle = 'rgba(255,255,255,0.3)';
            ctx.fillRect(px + 3, py + 3, BLOCK - 10, 4);
            
            ctx.shadowBlur = 0;
        }
        
        function shadeColor(color, percent) {
            const num = parseInt(color.slice(1), 16);
            const amt = Math.round(2.55 * percent);
            const R = Math.max(0, Math.min(255, (num >> 16) + amt));
            const G = Math.max(0, Math.min(255, ((num >> 8) & 0x00FF) + amt));
            const B = Math.max(0, Math.min(255, (num & 0x0000FF) + amt));
            return `#${(0x1000000 + R * 0x10000 + G * 0x100 + B).toString(16).slice(1)}`;
        }
        
        function drawNext() {
            nextCtx.fillStyle = 'rgba(0,0,0,0.3)';
            nextCtx.fillRect(0, 0, nextCanvas.width, nextCanvas.height);
            if (!nextPiece) return;
            
            const shape = nextPiece.shape;
            const blockSize = 20;
            const offsetX = (nextCanvas.width - shape[0].length * blockSize) / 2;
            const offsetY = (nextCanvas.height - shape.length * blockSize) / 2;
            
            for (let r = 0; r < shape.length; r++) {
                for (let c = 0; c < shape[r].length; c++) {
                    if (shape[r][c]) {
                        const px = offsetX + c * blockSize;
                        const py = offsetY + r * blockSize;
                        nextCtx.fillStyle = nextPiece.color;
                        nextCtx.shadowColor = nextPiece.color;
                        nextCtx.shadowBlur = 8;
                        nextCtx.fillRect(px + 1, py + 1, blockSize - 2, blockSize - 2);
                        nextCtx.shadowBlur = 0;
                    }
                }
            }
        }
        
        function updateDisplay() {
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lines').textContent = lines;
        }
        
        function resetDropInterval() {
            if (dropInterval) clearInterval(dropInterval);
            const speed = Math.max(100, 1000 - (level - 1) * 100);
            dropInterval = setInterval(drop, speed);
        }
        
        function startGame() {
            initAudio();
            board = createBoard();
            score = 0;
            level = 1;
            lines = 0;
            gameOver = false;
            currentTempo = baseTempo;
            nextPiece = randomPiece();
            spawn();
            updateDisplay();
            document.getElementById('startOverlay').classList.remove('show');
            document.getElementById('gameOverOverlay').classList.remove('show');
            resetDropInterval();
            startMusic();
            draw();
        }
        
        function endGame() {
            gameOver = true;
            if (dropInterval) clearInterval(dropInterval);
            stopMusic();
            playSound('gameover');
            
            if (score > best) {
                best = score;
                localStorage.setItem('tetrisBest', best);
                document.getElementById('best').textContent = best;
            }
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('gameOverOverlay').classList.add('show');
        }
        
        document.addEventListener('keydown', e => {
            if (gameOver) return;
            switch (e.key) {
                case 'ArrowLeft': case 'a': case 'A': move(-1); break;
                case 'ArrowRight': case 'd': case 'D': move(1); break;
                case 'ArrowDown': case 's': case 'S': drop(); score += 1; updateDisplay(); break;
                case 'ArrowUp': case 'w': case 'W': rotatePiece(); break;
                case ' ': hardDrop(); break;
            }
            e.preventDefault();
        });
        
        draw();
    </script>
</body>
</html>
